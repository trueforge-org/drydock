services:
  drydock:
    image: drydock:dev
    container_name: drydock-playwright-qa
    user: root
    ports:
      - "${DD_PLAYWRIGHT_PORT:-3333}:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./qa-compose.yml:/drydock/qa-compose.yml:ro
    environment:
      - DD_RUN_AS_ROOT=true
      - DD_ALLOW_INSECURE_ROOT=true
      - DD_LOG_FORMAT=text
      - DD_WATCHER_LOCAL_WATCHBYDEFAULT=false
      - DD_WATCHER_LOCAL_CRON=*/2 * * * *
      - DD_WATCHER_LOCAL_WATCHEVENTS=true
      # Docker trigger (manual only — auto=false prevents auto-updating test containers)
      - DD_TRIGGER_DOCKER_LOCAL_AUTO=false
      - DD_TRIGGER_DOCKER_LOCAL_PRUNE=true
      - DD_TRIGGER_HTTP_MYWEBHOOK_URL=http://httpbin.org/post
      - DD_TRIGGER_HTTP_MYWEBHOOK_METHOD=POST
      - DD_AUTH_BASIC_ADMIN_USER=admin
      - "DD_AUTH_BASIC_ADMIN_HASH=argon2id$$65536$$3$$4$$zUAK9+ktVWNHyQdv3SaOSgMv3T02F1Zj8D+t1un7D98=$$KEmn6d94w03YxIlw7U7l/ikD9lW+H3IC1N7xbAhOB9yKofA3HoxUBmuvBawvShhv337zDv4+g9hobNWeQEWwkQ=="
      - DD_SERVER_WEBHOOK_ENABLED=true
      - DD_SERVER_WEBHOOK_TOKEN=test-token-12345
      - DD_SESSION_SECRET=qa-test-session-secret
      - DD_PUBLIC_URL=http://localhost:${DD_PLAYWRIGHT_PORT:-3333}
      # --- OIDC (Dex) ---
      - DD_AUTH_OIDC_DEX_DISCOVERY=http://dex:5556/dex/.well-known/openid-configuration
      - DD_AUTH_OIDC_DEX_CLIENTID=drydock
      - DD_AUTH_OIDC_DEX_CLIENTSECRET=drydock-qa-secret
      # --- Slack trigger ---
      - DD_TRIGGER_SLACK_MYSLACK_TOKEN=xoxb-fake-slack-token-for-testing
      - DD_TRIGGER_SLACK_MYSLACK_CHANNEL=C01FAKECHANNEL
      # --- SMTP trigger ---
      - DD_TRIGGER_SMTP_MYEMAIL_HOST=smtp.example.com
      - DD_TRIGGER_SMTP_MYEMAIL_PORT=587
      - DD_TRIGGER_SMTP_MYEMAIL_USER=alerts@example.com
      - DD_TRIGGER_SMTP_MYEMAIL_PASS=fakesmtppassword
      - DD_TRIGGER_SMTP_MYEMAIL_FROM=alerts@example.com
      - DD_TRIGGER_SMTP_MYEMAIL_TO=admin@example.com
      # --- MQTT trigger (Home Assistant mode with filtering) ---
      - DD_TRIGGER_MQTT_QA_URL=mqtt://mosquitto:1883
      - DD_TRIGGER_MQTT_QA_HASS_ENABLED=true
      - DD_TRIGGER_MQTT_QA_HASS_PREFIX=homeassistant
      - DD_TRIGGER_MQTT_QA_HASS_DISCOVERY=true
      - DD_TRIGGER_MQTT_QA_HASS_ATTRIBUTES=short
      - DD_TRIGGER_MQTT_QA_HASS_FILTER_INCLUDE=name,image_name,result_tag,update_kind_kind
      # --- Docker Compose trigger (manual only) ---
      - DD_TRIGGER_DOCKERCOMPOSE_QA_FILE=/drydock/qa-compose.yml
      - DD_TRIGGER_DOCKERCOMPOSE_QA_AUTO=false
      # --- GHCR registry (authenticated) ---
      - DD_REGISTRY_GHCR_PRIVATE_USERNAME=myghuser
      - DD_REGISTRY_GHCR_PRIVATE_TOKEN=ghp_fakeGitHubTokenForTesting123
      # --- Gitea registry (self-hosted with custom CA) ---
      - DD_REGISTRY_GITEA_PRIVATE_URL=https://gitea.internal.example
      - DD_REGISTRY_GITEA_PRIVATE_LOGIN=gitea-bot
      - DD_REGISTRY_GITEA_PRIVATE_PASSWORD=replace-me
      - DD_REGISTRY_GITEA_PRIVATE_CAFILE=/certs/internal-ca.pem
      # --- Update Bouncer (security scanning) ---
      - DD_SECURITY_SCANNER=trivy
      - DD_SECURITY_TRIVY_SERVER=http://trivy-server:4954
      - DD_SECURITY_BLOCK_SEVERITY=CRITICAL
      - DD_SECURITY_SBOM_ENABLED=true
      - DD_SECURITY_SBOM_FORMATS=spdx-json,cyclonedx-json
      - DD_SECURITY_VERIFY_SIGNATURES=false
      # --- Maintenance window (QA) ---
      # Uncomment to test; adjust cron to match/not-match current time
      # - DD_WATCHER_LOCAL_MAINTENANCE_WINDOW=0 2-6 * * *
      # - DD_WATCHER_LOCAL_MAINTENANCE_WINDOW_TZ=UTC
      # --- Remote Docker watcher (DinD) ---
      - DD_WATCHER_REMOTE_HOST=docker-remote
      - DD_WATCHER_REMOTE_PORT=2375
      - DD_WATCHER_REMOTE_WATCHBYDEFAULT=true
      - DD_WATCHER_REMOTE_CRON=*/2 * * * *
      - DD_WATCHER_REMOTE_WATCHEVENTS=true
    depends_on:
      docker-remote:
        condition: service_healthy
      mosquitto:
        condition: service_healthy

  # ── OIDC Identity Provider (Dex) ─────────────────────
  dex:
    image: dexidp/dex:latest
    container_name: drydock-playwright-dex
    expose:
      - "5556"
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]

  # ── MQTT broker (Mosquitto) ──────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: drydock-playwright-mosquitto
    expose:
      - "1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Portainer (container management UI) ─────────────
  # Used for QA testing issue #156: recreating containers via Portainer
  # triggers Docker's transient <hex12>_<name> alias race condition.
  # Access at http://localhost:9443 (HTTPS) or http://localhost:9000
  portainer:
    image: portainer/portainer-ce:2.27.5
    container_name: drydock-playwright-portainer
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped
    labels:
      - dd.watch=false

  # ── Trivy vulnerability scanner (client-server mode) ──
  trivy-server:
    image: aquasec/trivy:0.69.3
    container_name: drydock-playwright-trivy-server
    command: ["server", "--listen", "0.0.0.0:4954"]
    expose:
      - "4954"

  # ── Remote Docker host (DinD) ────────────────────────
  docker-remote:
    image: docker:27-dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=
    expose:
      - "2375"
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Test containers running on the remote Docker host
  remote-bootstrap:
    image: docker:27
    depends_on:
      docker-remote:
        condition: service_healthy
    environment:
      - DOCKER_HOST=tcp://docker-remote:2375
    entrypoint: ["sh", "-c"]
    command:
      - |
        docker pull nginx:1.24.0
        docker run -d --name remote-nginx --label dd.watch=true --label "dd.display.name=Remote Nginx" --label dd.group=remote nginx:1.24.0
        docker pull redis:7.0.0
        docker run -d --name remote-redis --label dd.watch=true --label "dd.display.name=Remote Redis" --label dd.group=remote redis:7.0.0

  # ── Containers with updates available ──────────────────

  # Nginx with lifecycle hooks (tests hooks UI + group view)
  # Icon uses colon separator with nested prefix (tests Fix 03 + Fix 06)
  nginx-hooked:
    image: nginx:1.25.5-alpine
    pull_policy: missing
    container_name: drydock-playwright-nginx-hooked
    labels:
      - dd.watch=true
      - dd.display.name=Nginx (Hooked)
      - dd.display.icon=si:si:nginx
      - dd.group=web-stack
      - dd.hook.pre=echo "pre-update check"
      - dd.hook.post=echo "post-update cleanup"
      - dd.hook.timeout=30000

  # Redis in same group (tests group view)
  # Icon uses colon separator (tests Fix 06)
  redis-cache:
    image: redis:7.2.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-redis-cache
    labels:
      - dd.watch=true
      - dd.display.name=Redis Cache
      - dd.display.icon=si:redis
      - dd.group=web-stack

  # Traefik with auto-rollback (tests rollback UI)
  # Icon uses dash separator (standard format — baseline comparison)
  traefik-proxy:
    image: traefik:v3.0.0
    pull_policy: missing
    container_name: drydock-playwright-traefik-proxy
    labels:
      - dd.watch=true
      - dd.display.name=Traefik Proxy
      - dd.display.icon=si-traefikproxy
      - dd.group=infra
      - dd.rollback.auto=true
      - dd.rollback.window=120000
      - dd.rollback.interval=5000

  # LSCR/GHCR public image (tests anonymous token exchange)
  lscr-nginx:
    image: ghcr.io/linuxserver/nginx:1.26.2
    pull_policy: missing
    container_name: drydock-playwright-lscr-nginx
    labels:
      - dd.watch=true
      - dd.display.name=LSCR Nginx (GHCR)
      - dd.tag.include=^\d+\.\d+\.\d+$$

  # PostgreSQL ungrouped (tests ungrouped container)
  postgres-db:
    image: postgres:16.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-postgres-db
    environment:
      - POSTGRES_PASSWORD=testpass
    labels:
      - dd.watch=true
      - dd.display.name=PostgreSQL

  # ── Security scan test containers ──────────────────────

  # Node 16 Alpine — EOL, newer versions have known CRITICAL CVEs
  # After watcher finds update, trigger scan to get "blocked" bouncer status
  node-vulnerable:
    image: node:16.0.0-alpine
    container_name: drydock-playwright-node-vulnerable
    command: ["node", "-e", "setInterval(() => {}, 60000)"]
    labels:
      - dd.watch=true
      - dd.display.name=Node (Vulnerable)
      - dd.group=security-test
      - dd.tag.include=^16\.\d+\.\d+-alpine$$

  # Python 3.9 slim — older version with known HIGH vulns (not CRITICAL)
  # Should show "unsafe" bouncer after scan (not blocked since only CRITICALs block)
  python-unsafe:
    image: python:3.9.0-slim
    container_name: drydock-playwright-python-unsafe
    command: ["python", "-c", "import time; time.sleep(999999)"]
    labels:
      - dd.watch=true
      - dd.display.name=Python (Unsafe)
      - dd.group=security-test
      - dd.tag.include=^3\.9\.\d+-slim$$

  # ── Container at latest (no update available) ─────────

  # Alpine at latest — shows "up to date" state
  alpine-latest:
    image: alpine:latest
    pull_policy: always
    container_name: drydock-playwright-alpine-latest
    command: ["sleep", "infinity"]
    labels:
      - dd.watch=true
      - dd.display.name=Alpine (Latest)
      - dd.tag.include=^latest$$

  # ── Container pinned at current version (skip update) ──
  # Redis 7.4 has an update available but the bootstrap script
  # calls the skip-update API so it shows the "pinned" badge.
  redis-pinned:
    image: redis:7.4.0
    pull_policy: missing
    container_name: drydock-playwright-redis-pinned
    command: ["redis-server", "--save", ""]
    labels:
      - dd.watch=true
      - dd.display.name=Redis (Pinned)
      - dd.group=test

  # ── Log spammer (generates container log activity) ─────

  # Busybox printing a line every 5s — populates dashboard container log
  log-spammer:
    image: busybox:1.36
    pull_policy: missing
    container_name: drydock-playwright-log-spammer
    command: ["sh", "-c", "i=0; while true; do i=$((i+1)); echo \"[$$i] drydock-playwright-qa heartbeat $(date -u +%H:%M:%S)\"; sleep 5; done"]
    labels:
      - dd.watch=true
      - dd.display.name=Log Spammer
      - dd.group=infra

  # ── Slow-shutdown container (tests #156 recreate alias filtering) ───
  # Traps SIGTERM and delays 15s before exiting, simulating large apps
  # like Termix/Jellyfin that take time to shut down. Use with:
  #   docker compose -f test/qa-compose.yml up -d --force-recreate slow-shutdown
  # to reproduce the Docker transient alias race condition.
  slow-shutdown:
    image: busybox:1.36
    pull_policy: missing
    container_name: drydock-playwright-slow-shutdown
    command: ["sh", "-c", "trap 'echo SIGTERM received; sleep 15; exit 0' TERM; echo 'slow-shutdown running'; while true; do sleep 1; done"]
    stop_grace_period: 30s
    labels:
      - dd.watch=true
      - dd.display.name=Slow Shutdown
      - dd.group=infra

  # ── Stopped container (tests stopped status badge) ─────

  # Memcached — starts then exits (shows "stopped" in container list)
  memcached-stopped:
    image: memcached:1.6.0
    pull_policy: missing
    container_name: drydock-playwright-memcached-stopped
    command: ["sh", "-c", "exit 0"]
    labels:
      - dd.watch=true
      - dd.display.name=Memcached (Stopped)

  # ── Edge stack (multi-container batch QA) ──────────────
  edge-caddy:
    image: caddy:2.6.4-alpine
    pull_policy: missing
    container_name: drydock-playwright-edge-caddy
    command: ["caddy", "respond", "--listen", ":80", "QA"]
    labels:
      - dd.watch=true
      - dd.display.name=Caddy (Edge)
      - dd.group=edge
      - dd.tag.include=^2\.\d+\.\d+-alpine$$

  edge-nginx:
    image: nginx:1.21.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-edge-nginx
    labels:
      - dd.watch=true
      - dd.display.name=Nginx (Edge)
      - dd.group=edge
      - dd.tag.include=^1\.\d+\.\d+-alpine$$

  edge-httpd:
    image: httpd:2.4.50-alpine
    pull_policy: missing
    container_name: drydock-playwright-edge-httpd
    labels:
      - dd.watch=true
      - dd.display.name=Apache (Edge)
      - dd.group=edge
      - dd.tag.include=^2\.4\.\d+-alpine$$

  # ── Messaging stack (multi-container batch QA) ─────────
  msg-nats:
    image: nats:2.9.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-msg-nats
    command: ["-js"]
    labels:
      - dd.watch=true
      - dd.display.name=NATS (Messaging)
      - dd.group=messaging
      - dd.tag.include=^2\.\d+\.\d+-alpine$$

  msg-redis:
    image: redis:6.0.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-msg-redis
    labels:
      - dd.watch=true
      - dd.display.name=Redis (Messaging)
      - dd.group=messaging
      - dd.tag.include=^6\.\d+\.\d+-alpine$$

  # ── Runtime stack (multi-container batch QA) ───────────
  runtime-node:
    image: node:18.0.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-runtime-node
    command: ["node", "-e", "setInterval(() => {}, 60000)"]
    labels:
      - dd.watch=true
      - dd.display.name=Node 18 (Runtime)
      - dd.group=runtime
      - dd.tag.include=^18\.\d+\.\d+-alpine$$

  runtime-python:
    image: python:3.10.0-alpine
    pull_policy: missing
    container_name: drydock-playwright-runtime-python
    command: ["python", "-c", "import time; time.sleep(999999)"]
    labels:
      - dd.watch=true
      - dd.display.name=Python 3.10 (Runtime)
      - dd.group=runtime
      - dd.tag.include=^3\.10\.\d+-alpine$$

  # ── Standalone updateable containers ───────────────────
  busybox-old:
    image: busybox:1.34.0
    pull_policy: missing
    container_name: drydock-playwright-busybox-old
    command: ["sh", "-c", "while true; do sleep 60; done"]
    labels:
      - dd.watch=true
      - dd.display.name=BusyBox (Old)
      - dd.tag.include=^1\.\d+\.\d+$$

  alpine-old:
    image: alpine:3.14.0
    pull_policy: missing
    container_name: drydock-playwright-alpine-old
    command: ["sh", "-c", "while true; do sleep 60; done"]
    labels:
      - dd.watch=true
      - dd.display.name=Alpine (Old)
      - dd.tag.include=^3\.\d+\.\d+$$

volumes:
  portainer_data:
