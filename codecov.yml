codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "100...100"

  status:
    project:
      default:
        target: 100%
        threshold: 0%
      app:
        target: 100%
        threshold: 0%
        flags:
          - app
      ui:
        target: 100%
        threshold: 0%
        flags:
          - ui
    patch:
      default:
        target: 100%
        threshold: 0%
      app:
        target: 100%
        threshold: 0%
        flags:
          - app
      ui:
        target: 100%
        threshold: 0%
        flags:
          - ui

# Per-shard flag definitions. The CI workflow already uploads with
# `flags: app,ui`; these entries scope each flag to its source tree so
# the per-flag project/patch statuses above only consider the right
# files. carryforward: false ensures every commit reports fresh
# coverage — no stale data from previous runs fills in the gaps.
flags:
  app:
    paths:
      - app/
    carryforward: false
  ui:
    paths:
      - ui/
    carryforward: false

# PR comment with per-file coverage delta so drift is visible in the
# PR conversation without opening the Codecov dashboard.
comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
