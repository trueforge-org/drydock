name: Bug Report
description: Report a bug in Drydock
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Drydock version
      description: Check the UI footer or `DD_VERSION` env var
      placeholder: "e.g. 1.4.0, 1.3.9"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug
      placeholder: |
        1. Configure trigger with ...
        2. Start Drydock
        3. Wait for watcher cron
        4. See error in logs
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Relevant configuration
      description: Environment variables, docker-compose snippet, or container labels (redact secrets)
      render: yaml
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (`DD_LOG_LEVEL=debug` helps)
      render: text
    validations:
      required: false

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Docker Compose
        - Docker Run
        - Other
    validations:
      required: true

  - type: input
    id: docker-version
    attributes:
      label: Docker version
      description: Output of `docker version --format '{{.Server.Version}}'`
      placeholder: "e.g. 27.5.1"
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "e.g. Ubuntu 24.04 amd64, Synology DSM 7 arm64"
    validations:
      required: false
