# This file was automatically generated by `qlty init`.
# You can modify it to suit your needs.
# We recommend you to commit this file to your repository.
#
# This configuration is used by both Qlty CLI and Qlty Cloud.
#
#     Qlty CLI -- Code quality toolkit for developers
#     Qlty Cloud -- Fully automated Code Health Platform
#
# Try Qlty Cloud: https://qlty.sh
#
# For a guide to configuration, visit https://qlty.sh/d/config
# Or for a full reference, visit https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/*.d.ts",
  "**/.yarn/**",
  "**/bower_components/**",
  "**/build/**",
  "**/coverage/**",
  "**/cache/**",
  "**/dist/**",
  "**/generated/**",
  "**/node_modules/**",
  "**/target/**",
  "**/testdata/**",
  "**/vendor/**",
  ".qlty/out/**",
  ".qlty/logs/**",
  ".qlty/results/**",
  ".qlty/plugin_cachedir/**",
  ".playwright-cli/**",
  "output/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# Disabled: guard clauses, switch dispatches, and icon/color maps produce many returns by design
[smells.return_statements]
enabled = false

# Disabled: core domain files (watchers, triggers, API routes) are inherently complex;
# splitting them would hurt cohesion without improving readability
[smells.file_complexity]
enabled = false

[[source]]
name = "default"
default = true

[[plugin]]
name = "actionlint"

[[plugin]]
name = "checkov"

[[plugin]]
name = "dockerfmt"

[[plugin]]
name = "hadolint"

[[plugin]]
name = "markdownlint"
mode = "comment"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "shellcheck"

[[plugin]]
name = "shfmt"

[[plugin]]
name = "trivy"
drivers = [
  "config",
]
version = "0.69.3"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "yamllint"

# Entrypoint uses su-exec for runtime privilege drop; no static USER needed
[[triage]]
match.rules = ["trivy:DS002", "trivy:DS-0002"]
set.ignored = true

# markdownlint table style is low-signal for this repository's docs format
[[triage]]
match.rules = ["markdownlint:MD060"]
set.ignored = true

# next@16.2.2 — no patch available as of 2026-04-02; latest stable is affected
[[triage]]
match.rules = ["osv-scanner:CVE-2025-59472"]
set.ignored = true
